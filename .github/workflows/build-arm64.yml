name: Build Apple Silicon

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "**/*.m"
      - "**/*.h"
      - "**/*.xib"
      - "**/*.plist"
      - "**/*.strings"
      - "MLSwitcher2.xcodeproj/**"
      - ".github/workflows/build-arm64.yml"

jobs:
  build-arm64:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build ARM64 application
        run: |
          rm -rf "$PWD/build"
          mkdir -p "$PWD/build"

          set +e

          xcodebuild \
            -project MLSwitcher2.xcodeproj \
            -target MLSwitcher2 \
            -configuration Release \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            MACOSX_DEPLOYMENT_TARGET=11.0 \
            CONFIGURATION_BUILD_DIR="$PWD/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build | tee xcodebuild.log

          XCODE_STATUS=${PIPESTATUS[0]}
          set -e

          APP_PATH="$PWD/build/MLSwitcher2.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "MLSwitcher2.app was not created."
            exit "$XCODE_STATUS"
          fi

          echo "Application was created successfully."
          echo "xcodebuild exit code: $XCODE_STATUS"

      - name: Verify application architecture
        run: |
          APP_PATH="$PWD/build/MLSwitcher2.app"
          EXECUTABLE="$APP_PATH/Contents/MacOS/MLSwitcher2"

          test -d "$APP_PATH"
          test -f "$EXECUTABLE"

          file "$EXECUTABLE"
          lipo -info "$EXECUTABLE"

          if ! lipo -info "$EXECUTABLE" | grep -q "arm64"; then
            echo "The application executable is not ARM64."
            exit 1
          fi

          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Ad-hoc sign application
        run: |
          codesign \
            --force \
            --deep \
            --sign - \
            "$APP_PATH"

          codesign \
            --verify \
            --deep \
            --strict \
            --verbose=2 \
            "$APP_PATH"

      - name: Package application
        run: |
          ditto \
            -c \
            -k \
            --sequesterRsrc \
            --keepParent \
            "$APP_PATH" \
            MLSwitcher2-arm64.zip

      - name: Upload application
        uses: actions/upload-artifact@v4
        with:
          name: MLSwitcher2-arm64
          path: MLSwitcher2-arm64.zip
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
          if-no-files-found: ignore
